spring:
  application:
    name: vibeapp
  datasource:
    url: jdbc:h2:file:./data/testdb;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  file:
    name: ./logs/app.log
  level:
    root: info
    org.springframework.boot.autoconfigure: debug
    com.example.vibeapp: debug
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
