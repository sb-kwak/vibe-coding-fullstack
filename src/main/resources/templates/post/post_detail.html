<!DOCTYPE html>
<html class="dark" lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title th:text="${post.title} + ' - Vibe Coding'">게시글 상세 - Vibe Coding</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000",
                        "samsung-blue": "#2189ff",
                        "background-light": "#ffffff",
                        "background-dark": "#000000",
                        "card-light": "#f7f7f7",
                        "card-dark": "#121212"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
        }
    </style>
</head>

<body
    class="bg-white dark:bg-black text-slate-900 dark:text-slate-100 font-display transition-colors duration-300 overflow-x-hidden">
    <!-- Navigation Bar -->
    <header
        class="fixed top-0 left-0 right-0 z-50 border-b border-gray-100 dark:border-zinc-900 bg-white/80 dark:bg-black/80 backdrop-blur-xl">
        <div class="max-w-[1440px] mx-auto px-10 h-14 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <a th:href="@{/}"
                    class="text-lg font-bold tracking-tighter text-black dark:text-white uppercase no-underline">Vibe
                    Coding</a>
            </div>
            <nav class="hidden md:flex items-center gap-8">
                <a class="text-[13px] font-medium text-slate-600 dark:text-slate-400 hover:text-samsung-blue transition-colors no-underline"
                    th:href="@{/}">홈</a>
                <a class="text-[13px] font-medium text-slate-600 dark:text-slate-400 hover:text-samsung-blue transition-colors no-underline"
                    th:href="@{/posts}">게시판</a>
            </nav>
            <div class="flex items-center gap-4">
                <button class="text-[13px] font-semibold text-black dark:text-white">로그인</button>
                <button
                    class="bg-black dark:bg-white text-white dark:text-black text-[13px] font-bold px-5 py-1.5 rounded-full hover:opacity-80 transition-all">
                    시작하기
                </button>
            </div>
        </div>
    </header>

    <main class="pt-28 pb-20">
        <div class="max-w-[1000px] mx-auto px-10">
            <div class="mb-10 flex items-center justify-between">
                <div>
                    <span
                        class="px-3 py-1 bg-samsung-blue/10 text-samsung-blue rounded-full text-xs font-bold mb-4 inline-block"
                        th:text="'No. ' + ${post.no}">No. 1</span>
                    <h2 class="text-4xl font-bold text-black dark:text-white tracking-tight" th:text="${post.title}">게시글
                        제목</h2>
                </div>
                <div class="text-right">
                    <div class="text-xs text-slate-500 dark:text-slate-300 mb-1"
                        th:text="'작성일: ' + ${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">작성일: 2024-02-23
                        14:00</div>
                    <div class="text-xs text-slate-500 dark:text-slate-300"
                        th:text="'수정일: ' + ${#temporals.format(post.updatedAt, 'yyyy-MM-dd HH:mm')}">수정일: 2024-02-23
                        14:00</div>
                </div>
            </div>

            <div
                class="bg-white dark:bg-zinc-900 rounded-[32px] border border-gray-100 dark:border-zinc-800 shadow-sm p-12 min-h-[400px]">
                <div class="flex items-center gap-6 mb-8 pb-8 border-b border-gray-50 dark:border-zinc-800">
                    <div class="flex items-center gap-2 text-slate-500 text-sm">
                        <span class="material-symbols-outlined text-lg">visibility</span>
                        <span th:text="${post.views} + ' views'">420 views</span>
                    </div>
                </div>

                <div class="prose dark:prose-invert max-w-none">
                    <p class="text-lg leading-relaxed text-slate-800 dark:text-slate-200 whitespace-pre-wrap"
                        th:text="${post.content}">
                        게시글 내용이 여기에 표시됩니다.
                    </p>
                </div>
            </div>

            <div class="mt-10 flex justify-center gap-4">
                <a th:href="@{/posts}"
                    class="bg-slate-100 dark:bg-zinc-800 text-slate-600 dark:text-zinc-400 text-sm font-bold px-8 py-3 rounded-full hover:bg-slate-200 dark:hover:bg-zinc-700 transition-all no-underline flex items-center gap-2">
                    <span class="material-symbols-outlined text-lg">list</span>
                    목록으로 돌아가기
                </a>
                <a th:href="@{/posts/{no}/edit(no=${post.no})}"
                    class="bg-samsung-blue text-white text-sm font-bold px-8 py-3 rounded-full hover:opacity-90 transition-all no-underline flex items-center gap-2">
                    <span class="material-symbols-outlined text-lg">edit</span>
                    수정하기
                </a>
                <a th:href="@{/posts/{no}/delete(no=${post.no})}" onclick="return confirm('정말 삭제하시겠습니까?');"
                    class="bg-rose-500 text-white text-sm font-bold px-8 py-3 rounded-full hover:opacity-90 transition-all no-underline flex items-center gap-2">
                    <span class="material-symbols-outlined text-lg">delete</span>
                    삭제하기
                </a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white dark:bg-black pt-20 pb-10 border-t border-slate-200 dark:border-zinc-900">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <p class="text-xs text-slate-500">© 2024 Vibe Coding Inc. All rights reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
