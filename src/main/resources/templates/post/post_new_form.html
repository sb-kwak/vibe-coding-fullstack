<!DOCTYPE html>
<html class="dark" lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>새 게시글 작성 - Vibe Coding</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000",
                        "samsung-blue": "#2189ff",
                        "background-light": "#ffffff",
                        "background-dark": "#000000",
                        "card-light": "#f7f7f7",
                        "card-dark": "#121212"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
        }

        .form-input-focus:focus {
            border-color: #2189ff;
            box-shadow: 0 0 0 4px rgba(33, 137, 255, 0.1);
            outline: none;
        }
    </style>
</head>

<body
    class="bg-white dark:bg-black text-slate-900 dark:text-slate-100 font-display transition-colors duration-300 overflow-x-hidden">
    <!-- Navigation Bar -->
    <header
        class="fixed top-0 left-0 right-0 z-50 border-b border-gray-100 dark:border-zinc-900 bg-white/80 dark:bg-black/80 backdrop-blur-xl">
        <div class="max-w-[1440px] mx-auto px-10 h-14 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <a th:href="@{/}"
                    class="text-lg font-bold tracking-tighter text-black dark:text-white uppercase no-underline">Vibe
                    Coding</a>
            </div>
            <nav class="hidden md:flex items-center gap-8">
                <a class="text-[13px] font-medium text-slate-600 dark:text-slate-400 hover:text-samsung-blue transition-colors no-underline"
                    th:href="@{/}">홈</a>
                <a class="text-[13px] font-medium text-slate-600 dark:text-slate-400 hover:text-samsung-blue transition-colors no-underline"
                    th:href="@{/posts}">게시판</a>
            </nav>
            <div class="flex items-center gap-4">
                <button class="text-[13px] font-semibold text-black dark:text-white">로그인</button>
                <button
                    class="bg-black dark:bg-white text-white dark:text-black text-[13px] font-bold px-5 py-1.5 rounded-full hover:opacity-80 transition-all">
                    시작하기
                </button>
            </div>
        </div>
    </header>

    <main class="pt-28 pb-20">
        <div class="max-w-[800px] mx-auto px-10">
            <div class="mb-10">
                <h2 class="text-4xl font-bold text-black dark:text-white tracking-tight mb-4">새 게시글 작성</h2>
                <p class="text-slate-600 dark:text-slate-300">당신의 소중한 바이브를 공유해 주세요.</p>
            </div>

            <div
                class="bg-white dark:bg-zinc-900 rounded-[32px] border border-gray-100 dark:border-zinc-800 shadow-sm p-12">
                <form id="postForm" th:action="@{/posts/add}" th:object="${postCreateDto}" method="post">
                    <div class="mb-8">
                        <label for="title"
                            class="block text-sm font-bold text-slate-800 dark:text-slate-200 mb-3">제목</label>
                        <input type="text" id="title" th:field="*{title}"
                            class="w-full bg-gray-50 dark:bg-zinc-800 border border-gray-100 dark:border-zinc-700 rounded-2xl px-6 py-4 text-slate-900 dark:text-white form-input-focus placeholder:text-slate-400 transition-all"
                            placeholder="제목을 입력해 주세요."
                            th:classappend="${#fields.hasErrors('title')} ? 'border-rose-500 ring-rose-500' : ''">
                        <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}"
                            class="mt-2 text-sm text-rose-500 font-medium">Validation error</p>
                    </div>

                    <div class="mb-10">
                        <label for="content"
                            class="block text-sm font-bold text-slate-800 dark:text-slate-200 mb-3">내용</label>
                        <textarea id="content" th:field="*{content}" rows="10"
                            class="w-full bg-gray-50 dark:bg-zinc-800 border border-gray-100 dark:border-zinc-700 rounded-2xl px-6 py-4 text-slate-900 dark:text-white form-input-focus placeholder:text-slate-400 transition-all"
                            placeholder="내용을 입력해 주세요."
                            th:classappend="${#fields.hasErrors('content')} ? 'border-rose-500 ring-rose-500' : ''"></textarea>
                        <p th:if="${#fields.hasErrors('content')}" th:errors="*{content}"
                            class="mt-2 text-sm text-rose-500 font-medium">Validation error</p>
                    </div>

                    <div class="mb-10">
                        <label for="tags" class="block text-sm font-bold text-slate-800 dark:text-slate-200 mb-3">태그
                            (옵션)</label>
                        <input type="text" id="tags" th:field="*{tags}"
                            class="w-full bg-gray-50 dark:bg-zinc-800 border border-gray-100 dark:border-zinc-700 rounded-2xl px-6 py-4 text-slate-900 dark:text-white form-input-focus placeholder:text-slate-400 transition-all"
                            placeholder="쉼표(,)로 구분하여 입력해 주세요. 예: 바이브, 코딩, 스프링">
                    </div>

                    <div class="flex justify-center gap-4 pt-4">
                        <a th:href="@{/posts}"
                            class="bg-slate-100 dark:bg-zinc-800 text-slate-600 dark:text-zinc-400 text-sm font-bold px-10 py-3.5 rounded-full hover:bg-slate-200 dark:hover:bg-zinc-700 transition-all no-underline">
                            취소
                        </a>
                        <button type="submit"
                            class="bg-samsung-blue text-white text-sm font-bold px-12 py-3.5 rounded-full hover:opacity-90 transition-all shadow-lg shadow-samsung-blue/20">
                            등록하기
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white dark:bg-black pt-20 pb-10 border-t border-slate-200 dark:border-zinc-900">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <p class="text-xs text-slate-500">© 2024 Vibe Coding Inc. All rights reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
