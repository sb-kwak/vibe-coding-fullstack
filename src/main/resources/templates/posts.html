<!DOCTYPE html>
<html class="dark" lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>게시글 목록 - Vibe Coding</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000",
                        "samsung-blue": "#2189ff",
                        "background-light": "#ffffff",
                        "background-dark": "#000000",
                        "card-light": "#f7f7f7",
                        "card-dark": "#121212"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
        }

        .table-dark {
            --bs-table-bg: transparent;
            --bs-table-border-color: #2d2d2d;
            color: #e5e7eb;
        }

        .table {
            margin-bottom: 0;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display transition-colors duration-300 overflow-x-hidden bg-white dark:bg-black">
    <!-- Navigation Bar -->
    <header
        class="fixed top-0 left-0 right-0 z-50 border-b border-gray-100 dark:border-zinc-900 bg-white/80 dark:bg-black/80 backdrop-blur-xl">
        <div class="max-w-[1440px] mx-auto px-10 h-14 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <a th:href="@{/}"
                    class="text-lg font-bold tracking-tighter text-black dark:text-white uppercase no-underline">Vibe
                    Coding</a>
            </div>
            <nav class="hidden md:flex items-center gap-8">
                <a class="text-[13px] font-medium text-gray-600 dark:text-gray-300 hover:text-samsung-blue transition-colors no-underline"
                    th:href="@{/}">홈</a>
                <a class="text-[13px] font-medium text-gray-600 dark:text-gray-300 hover:text-samsung-blue transition-colors no-underline"
                    th:href="@{/posts}">게시판</a>
            </nav>
            <div class="flex items-center gap-4">
                <button class="text-[13px] font-semibold text-black dark:text-white">로그인</button>
                <button
                    class="bg-black dark:bg-white text-white dark:text-black text-[13px] font-bold px-5 py-1.5 rounded-full hover:opacity-80 transition-all">
                    시작하기
                </button>
            </div>
        </div>
    </header>

    <main class="pt-28 pb-20">
        <div class="max-w-[1440px] mx-auto px-10">
            <div class="mb-12 flex justify-between items-end">
                <div>
                    <h2 class="text-4xl font-bold text-black dark:text-white tracking-tight mb-4">게시글 목록</h2>
                    <p class="text-gray-500 dark:text-zinc-400">바이브코딩 커뮤니티의 최신 소식을 확인하세요.</p>
                </div>
                <a th:href="@{/posts/new}"
                    class="bg-black dark:bg-white text-white dark:text-black text-sm font-bold px-6 py-2.5 rounded-full hover:opacity-80 transition-all no-underline flex items-center gap-2">
                    <span class="material-symbols-outlined text-lg">add</span>
                    새 글
                </a>
            </div>

            <div
                class="bg-white dark:bg-zinc-900 rounded-[32px] overflow-hidden border border-gray-100 dark:border-zinc-800 shadow-sm">
                <div class="p-8">
                    <table class="table align-middle" th:classappend="${#theme == 'dark'} ? 'table-dark' : ''">
                        <thead class="text-gray-400 text-xs uppercase tracking-wider">
                            <tr>
                                <th class="border-0 pb-6 font-medium">번호</th>
                                <th class="border-0 pb-6 font-medium">제목</th>
                                <th class="border-0 pb-6 font-medium text-center">생성일</th>
                                <th class="border-0 pb-6 font-medium text-center">조회수</th>
                            </tr>
                        </thead>
                        <tbody class="text-sm font-medium">
                            <tr th:each="post : ${posts}"
                                class="border-b border-gray-50 dark:border-zinc-800 last:border-0 hover:bg-gray-50 dark:hover:bg-zinc-800/50 transition-colors">
                                <td class="py-6 text-gray-500 dark:text-zinc-500" th:text="${post.no}">1</td>
                                <td class="py-6">
                                    <a th:href="@{/posts/{no}(no=${post.no})}"
                                        class="text-black dark:text-white no-underline hover:text-samsung-blue transition-colors"
                                        th:text="${post.title}">게시글 제목입니다.</a>
                                </td>
                                <td class="py-6 text-center text-gray-500 dark:text-zinc-400"
                                    th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}">2024-02-23</td>
                                <td class="py-6 text-center">
                                    <span
                                        class="px-3 py-1 bg-gray-100 dark:bg-zinc-800 rounded-full text-[12px] text-gray-600 dark:text-zinc-400"
                                        th:text="${post.views}">420</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="px-10 py-6 border-t border-gray-100 dark:border-zinc-800 flex items-center justify-between">
                    <div class="text-sm text-gray-500 dark:text-zinc-400">
                        Page <span class="font-bold text-black dark:text-white" th:text="${currentPage}">1</span> of
                        <span class="font-bold text-black dark:text-white" th:text="${totalPages}">10</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <a th:if="${currentPage > 1}" th:href="@{/posts(page=${currentPage - 1})}"
                            class="px-4 py-2 bg-gray-50 dark:bg-zinc-800 text-slate-600 dark:text-zinc-400 text-sm font-bold rounded-xl hover:bg-slate-100 dark:hover:bg-zinc-700 transition-all no-underline flex items-center gap-2">
                            <span class="material-symbols-outlined text-lg">chevron_left</span>
                            이전
                        </a>
                        <div class="flex items-center gap-1">
                            <a th:each="p : ${#numbers.sequence(1, totalPages)}" th:href="@{/posts(page=${p})}"
                                th:text="${p}"
                                class="w-10 h-10 flex items-center justify-center rounded-xl text-sm font-bold transition-all no-underline"
                                th:classappend="${p == currentPage} ? 'bg-samsung-blue text-white' : 'text-slate-500 hover:bg-gray-50 dark:hover:bg-zinc-800'">
                                1
                            </a>
                        </div>
                        <a th:if="${currentPage < totalPages}" th:href="@{/posts(page=${currentPage + 1})}"
                            class="px-4 py-2 bg-gray-50 dark:bg-zinc-800 text-slate-600 dark:text-zinc-400 text-sm font-bold rounded-xl hover:bg-slate-100 dark:hover:bg-zinc-700 transition-all no-underline flex items-center gap-2">
                            다음
                            <span class="material-symbols-outlined text-lg">chevron_right</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white dark:bg-slate-950 pt-20 pb-10 border-t border-slate-200 dark:border-slate-900">
        <div class="max-w-7xl mx-auto px-6">
            <div class="pt-8 flex flex-col md:flex-row items-center justify-between gap-4 text-xs text-slate-500">
                <p>© 2024 Vibe Coding Inc. All rights reserved.</p>
                <div class="flex items-center gap-6">
                    <span>(주)바이브코딩 | 대표자: 김바이브 | 사업자번호: 000-00-00000</span>
                    <span>서울시 강남구 테크로 123 바이브타워</span>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
